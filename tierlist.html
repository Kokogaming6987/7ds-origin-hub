  <title>Tier List - 7DS Origin Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo-section">
        <div class="logo-text">7DS Origin Hub</div>
      </div>
      <nav class="nav-links">
        <a href="index.html" class="nav-item">
          <span class="nav-icon">🏠</span>
          <span class="nav-text">Accueil</span>
        </a>
        <a href="tierlist.html" class="nav-item active">
          <span class="nav-icon">📊</span>

        <a href="characters.html" class="nav-item">

        <a href="guide.html" class="nav-item">

          <span class="nav-text">Guides</span>
        </a>
        <a href="codes.html" class="nav-item">
          <span class="nav-icon">🎁</span>

    <main class="main-content">
      <section class="section-header">
        <h2 class="section-title">Tier List Personnages</h2>

      <div class="tier-list">
        <div class="tier-row">
          <div class="tier-label tier-s">S</div>
          <div class="tier-content">
            <div class="char-thumb" data-name="Meliodas">M</div>
            <div class="char-thumb" data-name="Elizabeth">E</div>
            <div class="char-thumb" data-name="Tristan">T</div>
            <div class="char-thumb" data-name="Diane">D</div>
          </div>
        </div>

        <div class="tier-row">
          <div class="tier-label tier-a">A</div>
          <div class="tier-content">
            <div class="char-thumb" data-name="King">K</div>
            <div class="char-thumb" data-name="Ban">B</div>
            <div class="char-thumb" data-name="Gowther">G</div>
            <div class="char-thumb" data-name="Escanor">Es</div>
          </div>
        </div>

        <div class="tier-row">
          <div class="tier-label tier-b">B</div>
          <div class="tier-content">
            <div class="char-thumb" data-name="Merlin">Me</div>
            <div class="char-thumb" data-name="Jericho">J</div>
            <div class="char-thumb" data-name="Howzer">H</div>
            <div class="char-thumb" data-name="Gilthunder">Gt</div>
          </div>
        </div>

        <div class="tier-row">
          <div class="tier-label tier-c">C</div>
          <div class="tier-content">
            <div class="char-thumb" data-name="Guila">Gu</div>
